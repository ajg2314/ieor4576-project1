<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Probability Domain Chatbot</title>
    <style>
      body { font-family: sans-serif; max-width: 900px; margin: 40px auto; padding: 0 16px; }
      textarea { width: 100%; height: 90px; }
      button { padding: 10px 14px; margin-top: 8px; }
      pre { white-space: pre-wrap; background: #f6f6f6; padding: 12px; border-radius: 8px; }
    </style>
  </head>
  <body>
    <h2>Probability Domain Chatbot</h2>
    <p>Ask an undergraduate probability question (definitions, basic rules, discrete distributions, conditional expectation, LLN/CLT statements).</p>
    <textarea id="q" placeholder="Type your question..."></textarea>
    <br/>
    <button onclick="send()">Ask</button>
    <h3>Answer</h3>
    <pre id="a"></pre>

    <script>
      async function send() {
        const q = document.getElementById('q').value;
        document.getElementById('a').textContent = "Thinking...";
        const resp = await fetch("/chat", {
          method: "POST",
          headers: {"Content-Type":"application/json"},
          body: JSON.stringify({question: q})
        });
        const data = await resp.json();
        document.getElementById('a').textContent = data.answer || JSON.stringify(data, null, 2);
      }
    </script>
  </body>
</html>
